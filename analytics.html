<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Jambala · Deep Analytics</title>
<style>
:root{
  --bg:#0e1013; --card:#161a21; --elev:#1d222c; --line:#262c38;
  --ink:#e9ecf1; --ink2:#9aa2ae; --ink3:#6a7280;
  --brand:#f5b642; --c1:#60a5fa; --c2:#34d399; --c3:#f5b642; --c4:#c084fc; --c5:#fb923c;
  --good:#34d399; --warn:#fbbf24; --bad:#f87171;
  --radius:14px; --gap:14px;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
a{color:var(--brand)}
.wrap{max-width:1180px;margin:0 auto;padding:22px 18px 70px}
#gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:50}
.gatebox{width:min(360px,90vw);background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:28px 24px;text-align:center}
.gatebox h1{font-size:19px;margin:0 0 4px}.gatebox p{color:var(--ink2);font-size:13px;margin:0 0 18px}
.gatebox input{width:100%;padding:11px 12px;border-radius:10px;border:1px solid var(--line);background:var(--elev);color:var(--ink);font-size:15px;text-align:center}
.gatebox button{margin-top:12px;width:100%;padding:11px;border:0;border-radius:10px;background:var(--brand);color:#1a1206;font-weight:700;font-size:14px;cursor:pointer}
.gateerr{color:var(--bad);font-size:12.5px;margin-top:10px;min-height:16px}
.star{color:var(--brand);font-size:26px}
header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:20px}.brand .dot{color:var(--brand)}
.asof{color:var(--ink3);font-size:12px}
.sub{color:var(--ink3);font-size:12.5px;margin:3px 0 16px}
h2{font-size:13px;text-transform:uppercase;letter-spacing:.7px;color:var(--ink3);font-weight:700;margin:32px 0 12px;display:flex;align-items:center;gap:8px}
h2 .n{color:var(--ink2);text-transform:none;letter-spacing:0;font-weight:500;font-size:12px}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:var(--gap)}
@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:13px 14px}
.kpi .k{color:var(--ink3);font-size:11px;text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.kpi .v{font-size:25px;font-weight:750;margin-top:5px;line-height:1;letter-spacing:-.5px}
.kpi .d{font-size:11.5px;color:var(--ink2);margin-top:6px;line-height:1.4}
.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--gap)}
@media(max-width:900px){.cards{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px}
.card .ct{font-size:13px;font-weight:650;margin-bottom:3px}
.card .cs{font-size:11.5px;color:var(--ink3);margin-bottom:12px;line-height:1.45}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;color:var(--ink3);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;padding:0 8px 7px 0;border-bottom:1px solid var(--line)}
td{padding:7px 8px 7px 0;border-bottom:1px solid var(--line);color:var(--ink2)}
td.n{text-align:right;font-variant-numeric:tabular-nums;color:var(--ink)}
tr:last-child td{border-bottom:0}
.bar{height:7px;border-radius:4px;background:var(--c1);display:inline-block;vertical-align:middle}
.brow{display:flex;align-items:center;gap:9px;padding:5px 0}
.blab{width:92px;font-size:12px;color:var(--ink2);flex:none}
.bval{font-size:12px;color:var(--ink);font-variant-numeric:tabular-nums;flex:none;min-width:66px;text-align:right}
.btrack{flex:1;background:var(--elev);border-radius:4px;overflow:hidden;height:7px}
.callout{background:var(--elev);border:1px solid var(--line);border-left:3px solid var(--brand);border-radius:9px;padding:11px 13px;font-size:12.5px;color:var(--ink2);line-height:1.55;margin-top:12px}
.callout b{color:var(--ink)}
.big{font-size:12.5px;color:var(--ink2);line-height:1.6}
.tag{display:inline-block;font-size:10.5px;padding:2px 7px;border-radius:20px;font-weight:650;letter-spacing:.3px}
.tg{background:rgba(52,211,153,.14);color:var(--good)}.ta{background:rgba(251,191,36,.14);color:var(--warn)}.tr{background:rgba(248,113,113,.14);color:var(--bad)}
.foot{margin-top:44px;padding-top:16px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.foot img{height:20px;opacity:.75}.foot span{color:var(--ink3);font-size:11.5px}
.note{color:var(--ink3);font-size:11px;margin-top:8px;line-height:1.5}
</style>
</head>
<body>
<div id="gate">
  <div class="gatebox">
    <div class="star">✦</div>
    <h1>Jambala Deep Analytics</h1>
    <p>Enter passphrase to view</p>
    <input id="pw" type="password" autocomplete="off" placeholder="passphrase" autofocus>
    <button id="go">Unlock</button>
    <div class="gateerr" id="err"></div>
  </div>
</div>
<div class="wrap" id="app" style="display:none"></div>

const $=(s,r=document)=>r.querySelector(s);
const b64d=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function deriveKey(pw,salt){
  const base=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:150000,hash:"SHA-256"},base,{name:"AES-GCM",length:256},false,["decrypt"]);
}
async function decrypt(pw){
  const [s,i,c]=ENC.split(".");
  const key=await deriveKey(pw,b64d(s));
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(i)},key,b64d(c));
  return JSON.parse(new TextDecoder().decode(pt));
}
async function unlock(){
  const pw=$("#pw").value.trim(); if(!pw)return; $("#err").textContent="";
  try{ const d=await decrypt(pw); sessionStorage.setItem("jpw",pw); $("#gate").style.display="none"; $("#app").style.display="block"; render(d); }
  catch(e){ $("#err").textContent="Wrong passphrase."; }
}
$("#go").onclick=unlock; $("#pw").addEventListener("keydown",e=>{if(e.key==="Enter")unlock()});
(async()=>{const s=sessionStorage.getItem("jpw"); if(s){try{const d=await decrypt(s);$("#gate").style.display="none";$("#app").style.display="block";render(d);}catch(e){}}})();

const money=(n,d=2)=>n==null?"—":"£"+Number(n).toLocaleString("en-GB",{minimumFractionDigits:d,maximumFractionDigits:d});
const num=n=>n==null?"—":Number(n).toLocaleString("en-GB");
const COLORS=["var(--c1)","var(--c2)","var(--c3)","var(--c4)","var(--c5)"];

function bars(rows,valFmt,color){
  const mx=Math.max(...rows.map(r=>r.v),1);
  return rows.map(r=>`<div class="brow"><div class="blab">${r.k}</div>
    <div class="btrack"><div class="bar" style="width:${Math.max(1,100*r.v/mx)}%;background:${color||"var(--c1)"}"></div></div>
    <div class="bval">${valFmt(r.v,r)}</div></div>`).join("");
}
function table(head,rows){
  return `<table><thead><tr>${head.map((h,i)=>`<th${i?' style="text-align:right"':''}>${h}</th>`).join("")}</tr></thead>
    <tbody>${rows.map(r=>`<tr>${r.map((c,i)=>`<td class="${i?'n':''}">${c}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
}

function render(D){
  const u=D.unit, a=D.assumptions;
  const ratioTag = u.ratio>=3?"tg":u.ratio>=1?"ta":"tr";
  const h=[];
  h.push(`<header>
    <div class="brand"><span class="dot">✦</span> Jambala <span style="color:var(--ink3);font-weight:600">Deep Analytics</span></div>
    <div class="asof">${D.gen} · <a href="./index.html">← Ads dashboard</a></div>
  </header>
  <div class="sub">Customer economics, cohorts &amp; behaviour · ${num(u.customers)} customers · ${num(u.orders)} orders · ${a.excluded} test orders excluded</div>`);

  // ---- unit economics ----
  h.push(`<h2>① Unit economics <span class="n">— the number that decides whether to scale</span></h2>
  <div class="kpis">
    <div class="kpi"><div class="k">LTV : CAC</div><div class="v">${u.ratio==null?"—":u.ratio+":1"}</div>
      <div class="d"><span class="tag ${ratioTag}">${u.ratio>=3?"healthy":u.ratio>=1?"breakeven":"losing"}</span> target 3:1</div></div>
    <div class="kpi"><div class="k">Revenue LTV</div><div class="v">${money(u.ltv)}</div><div class="d">median ${money(u.medLtv)} — mean is whale-skewed</div></div>
    <div class="kpi"><div class="k">Contribution LTV</div><div class="v">${money(u.contribLtv)}</div><div class="d">after ${Math.round(a.prizeLoad*100)}% prize load + ${Math.round(a.fee*100)}% fees</div></div>
    <div class="kpi"><div class="k">CAC</div><div class="v">${money(u.cac)}</div><div class="d">blended 7d cost per purchase</div></div>
    <div class="kpi"><div class="k">Repeat rate</div><div class="v">${u.repeatPct}%</div><div class="d">${u.ordersPerCust} orders/customer</div></div>
  </div>
  <div class="callout">We make <b>${money(u.contribLtv-u.cac)}</b> per customer acquired. Revenue LTV needs to reach <b>${money(u.breakeven)}</b> just to break even on CAC, and <b>${money(u.target3)}</b> for a healthy 3:1 — versus <b>${money(u.ltv)}</b> today.
  <br><b>MER = AOV ÷ CPA.</b> Lifting AOV is mechanically the fastest route: it raises LTV and the ratio at the same time.</div>`);

  // ---- cohorts ----
  h.push(`<h2>② Cohort LTV <span class="n">— is customer quality improving or decaying?</span></h2>
  <div class="cards"><div class="card">
    <div class="ct">LTV by acquisition month</div>
    <div class="cs">Each row = customers first acquired that month, and everything they've spent since.</div>
    ${table(["Cohort","Custs","LTV","Ord/cust","Repeat"],
      D.cohorts.map(c=>[c.month,num(c.custs),money(c.ltv),c.ordersPer,c.repeatPct+"%"]))}
  </div><div class="card">
    <div class="ct">First order vs. everything after</div>
    <div class="cs">How much of a cohort's value arrives on day one (M0) vs later.</div>
    ${bars(D.cohorts.map(c=>({k:c.month,v:c.ltv,c})),(v,r)=>money(v)+" <span style='color:var(--ink3)'>("+r.c.repeatPct+"% rpt)</span>","var(--c2)")}
    <div class="note">Newer cohorts are still maturing — but a sustained decline as volume grows means we're buying progressively weaker customers.</div>
  </div></div>`);

  // ---- concentration ----
  h.push(`<h2>③ Revenue concentration <span class="n">— how fragile is the base?</span></h2>
  <div class="cards"><div class="card">
    <div class="ct">Who actually pays the bills</div>
    <div class="cs">Share of all revenue held by the top slice of customers.</div>
    ${bars(D.concentration.map(c=>({k:"Top "+c.pct+"%",v:c.share,c})),(v,r)=>v+"% <span style='color:var(--ink3)'>("+r.c.custs+" custs)</span>","var(--c3)")}
    <div class="callout" style="margin-top:14px">This isn't a customer base — it's a handful of whales and a long tail of strangers. Losing a few whales collapses the economics.</div>
  </div><div class="card">
    <div class="ct">Top 10 customers</div>
    <div class="cs">Your VIP list. No retention programme currently targets them.</div>
    ${table(["#","Revenue","Orders"],D.whales.map(w=>["#"+w.rank,money(w.rev),w.orders]))}
  </div></div>`);

  // ---- repeat behaviour ----
  const totGap=D.gapBuckets.reduce((s,g)=>s+g.n,0)||1;
  h.push(`<h2>④ Repeat behaviour <span class="n">— when do they come back?</span></h2>
  <div class="cards"><div class="card">
    <div class="ct">Time to 2nd purchase</div>
    <div class="cs">Median gap: <b style="color:var(--ink)">${u.medGap==null?"—":u.medGap+" days"}</b></div>
    ${bars(D.gapBuckets.map(g=>({k:g.label,v:g.n})),(v)=>v+" <span style='color:var(--ink3)'>("+Math.round(100*v/totGap)+"%)</span>","var(--c4)")}
    <div class="callout" style="margin-top:14px">Repeat purchases happen <b>immediately</b>, not months later. That means "retention" here is really <b>same-session basket expansion</b> — bundles, multi-buy and post-purchase upsell will beat a win-back email campaign.</div>

    <div class="ct">Orders per customer</div>
    <div class="cs">The one-and-done problem, quantified.</div>
    ${bars(D.orderDist.slice(0,8).map(o=>({k:o.orders+" order"+(o.orders>1?"s":""),v:o.custs,o})),(v,r)=>num(v)+" <span style='color:var(--ink3)'>("+r.o.pct+"%)</span>","var(--c1)")}
  </div></div>`);

  // ---- basket ----
  h.push(`<h2>⑤ Basket <span class="n">— AOV ${money(u.aov)} · ${money(u.perTicket)} per ticket</span></h2>
  <div class="cards"><div class="card">
    <div class="ct">Tickets per order</div>
    <div class="cs">Bulk buyers are where the money is; single-ticket orders can never pay back CAC.</div>
    ${bars(D.basket.map(b=>({k:b.label,v:b.n})),(v)=>num(v)+" orders","var(--c2)")}
  </div><div class="card">
    <div class="ct">Revenue by competition</div>
    <div class="cs">Excludes test products.</div>
    ${table(["Competition","Revenue","Tickets"],D.products.slice(0,9).map(p=>[p.name,money(p.rev,0),num(p.tix)]))}
  </div></div>`);

  // ---- demand curve ----
  h.push(`<h2>⑥ Price vs demand <span class="n">— does this market resist higher ticket prices?</span></h2>
  <div class="card">
    <div class="ct">Every competition: ticket price → sell-through</div>
    <div class="cs">If price drove demand, sell-through would fall as price rises. It doesn't — <b style="color:var(--ink)">prize appeal drives demand, not price</b>.</div>
    ${table(["Competition","Ticket","Sold / cap","Sell-through","Ticket revenue"],
      D.demand.map(d=>[d.name,money(d.price),num(d.sold)+" / "+num(d.cap),d.pct+"%",money(d.rev,0)]))}
    <div class="callout">Cheap tickets are not buying volume — they're forfeiting revenue. Raising ticket price lifts AOV → LTV → LTV:CAC, all at once.</div>
  </div>`);

  // ---- audience ----
  const abox=(title,sub,rows,color)=>`<div class="card"><div class="ct">${title}</div><div class="cs">${sub}</div>
    ${table(["Segment","Spend","Sales","CPA"],rows.map(r=>[r.seg,money(r.spend,0),r.purch,r.cpa==null?"—":money(r.cpa)]))}</div>`;
  h.push(`<h2>⑦ Where the ads actually work <span class="n">— Meta, last 30 days</span></h2>
  <div class="cards">
    ${abox("Platform","Same budget, very different efficiency.",D.audience.platform)}
    ${abox("Age","Which ages convert vs just click.",D.audience.age)}
    ${abox("Gender","",D.audience.gender)}
    ${abox("Device","",D.audience.device)}
  </div>
  <div class="card" style="margin-top:14px"><div class="ct">Best hours to spend</div>
    <div class="cs">Top spending hours by CPA — shift budget toward the cheap hours.</div>
    ${table(["Hour","Spend","Sales","CPA"],D.audience.hour.map(r=>[r.seg,money(r.spend,0),r.purch,r.cpa==null?"—":money(r.cpa)]))}</div>`);

  // ---- timing ----
  h.push(`<h2>⑧ When customers buy <span class="n">— store orders, all history</span></h2>
  <div class="cards"><div class="card">
    <div class="ct">Orders by hour (UTC)</div><div class="cs">Deadline surges cluster late; mornings are browse-heavy.</div>
    ${bars(D.byHour.filter(x=>x.n>0).map(x=>({k:String(x.h).padStart(2,"0")+":00",v:x.n})),(v)=>num(v),"var(--c1)")}
  </div><div class="card">
    <div class="ct">Orders by day of week</div><div class="cs">AOV varies more than volume — that's where the money is.</div>
    ${table(["Day","Orders","Revenue","AOV"],["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map((n,i)=>{
      const d=D.byDow[i]; return [n,num(d.n),money(d.rev,0),money(d.aov)];}))}
  </div></div>`);

  // ---- funnel ----
  const f0=D.funnel[0]?.n||1;
  h.push(`<h2>⑨ Conversion funnel <span class="n">— Meta-attributed, last 7 days</span></h2>
  <div class="card">
    ${bars(D.funnel.map((s,i)=>({k:s.stage,v:s.n,i,prev:i?D.funnel[i-1].n:null})),
      (v,r)=>num(v)+(r.prev?` <span style='color:var(--ink3)'>(${Math.round(100*v/r.prev)}% of prev)</span>`:""),"var(--c5)")}
    <div class="note">Meta's pixel materially under-counts here — Shopify is ground truth. Treat this as shape, not absolute volume.</div>
  </div>`);

  h.push(`<div class="foot"><img src="${S7LOGO}" alt="Sector7"><span>Built by Sector7 · figures auto-refresh · assumptions: ${Math.round(a.prizeLoad*100)}% prize load, ${Math.round(a.fee*100)}% fees, orders &gt;£${a.testOrderMax} excluded as test data</span></div>`);
  $("#app").innerHTML=h.join("");
}
</script>
</body>
</html>
