<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Jambala · Ads Dashboard</title>
<style>
:root{
  --bg:#0e1013; --card:#161a21; --elev:#1d222c; --line:#262c38;
  --ink:#e9ecf1; --ink2:#9aa2ae; --ink3:#6a7280;
  --brand:#f5b642; --spend:#60a5fa; --conv:#34d399; --roas:#f5b642;
  --good:#34d399; --warn:#fbbf24; --bad:#f87171;
  --radius:14px; --gap:14px;
  font-synthesis:none;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased}
a{color:var(--brand)}
.wrap{max-width:1180px;margin:0 auto;padding:22px 18px 60px}
/* ---- gate ---- */
#gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:50}
.gatebox{width:min(360px,90vw);background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:28px 24px;text-align:center}
.gatebox h1{font-size:19px;margin:0 0 4px} .gatebox p{color:var(--ink2);font-size:13px;margin:0 0 18px}
.gatebox input{width:100%;padding:11px 12px;border-radius:10px;border:1px solid var(--line);background:var(--elev);color:var(--ink);font-size:15px;text-align:center}
.gatebox button{margin-top:12px;width:100%;padding:11px;border:0;border-radius:10px;background:var(--brand);color:#1a1206;font-weight:700;font-size:14px;cursor:pointer}
.gateerr{color:var(--bad);font-size:12.5px;margin-top:10px;min-height:16px}
.star{color:var(--brand);font-size:26px}
/* ---- header ---- */
header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:4px}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:.3px;font-size:20px}
.brand .dot{color:var(--brand)}
.asof{color:var(--ink3);font-size:12px}
.tabs{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:3px;gap:2px}
.tabs button{border:0;background:transparent;color:var(--ink2);padding:7px 13px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600}
.tabs button.on{background:var(--elev);color:var(--ink)}
.sub{color:var(--ink3);font-size:12.5px;margin:2px 0 18px}
/* ---- grid ---- */
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:var(--gap)}
@media(max-width:900px){.kpis{grid-template-columns:repeat(3,1fr)}}
@media(max-width:520px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:13px 14px}
.kpi .k{color:var(--ink3);font-size:11px;text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.kpi .v{font-size:26px;font-weight:750;margin-top:5px;line-height:1;letter-spacing:-.5px}
.kpi .d{font-size:11.5px;color:var(--ink2);margin-top:6px}
.pill{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:1px}
.g{background:var(--good)}.a{background:var(--warn)}.r{background:var(--bad)}
h2{font-size:13px;text-transform:uppercase;letter-spacing:.7px;color:var(--ink3);font-weight:700;margin:30px 0 12px}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--gap)}
@media(max-width:900px){.cards{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px}
.card .ct{font-size:12.5px;color:var(--ink2);font-weight:600;margin-bottom:2px;display:flex;justify-content:space-between}
.card .cv{font-size:13px;color:var(--ink3)}
.chart{width:100%;height:120px;margin-top:8px;overflow:visible}
.chart .grid{stroke:var(--line);stroke-width:1}
.chart .axis{fill:var(--ink3);font-size:9px}
.chart .dot{fill:#fff}
.tip{position:fixed;pointer-events:none;background:#0b0d10;border:1px solid var(--line);border-radius:8px;padding:6px 9px;font-size:11.5px;color:var(--ink);z-index:30;opacity:0;transition:opacity .08s;white-space:nowrap}
/* funnel */
.funnel .row{display:flex;align-items:center;gap:10px;margin:7px 0}
.funnel .lbl{width:118px;font-size:12px;color:var(--ink2);flex:none}
.funnel .bar{height:22px;border-radius:6px;background:linear-gradient(90deg,var(--spend),#3b82f6);min-width:2px}
.funnel .num{font-size:12px;color:var(--ink);font-weight:600;width:52px;text-align:right;flex:none}
.funnel .pct{font-size:11px;color:var(--ink3);width:44px;flex:none}
.flag{background:#2a1d14;border:1px solid #4a2f1a;color:#f0b483;border-radius:9px;padding:9px 11px;font-size:12px;margin-top:9px;line-height:1.4}
/* alerts / insights */
.alert{display:flex;gap:9px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-left-width:3px;border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:13px;line-height:1.45}
.alert.good{border-left-color:var(--good)} .alert.warning{border-left-color:var(--warn)} .alert.serious{border-left-color:var(--bad)} .alert.info{border-left-color:var(--ink3)}
.alert .ico{font-size:14px;flex:none;line-height:1.3}
.ins{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:6px 18px}
.ins li{margin:11px 0;font-size:13.5px;line-height:1.5;color:var(--ink)}
.ins li b{color:#fff}
.foot{color:var(--ink3);font-size:11.5px;margin-top:34px;text-align:center;line-height:1.7}
.split{display:grid;grid-template-columns:1.15fr .85fr;gap:var(--gap)}
@media(max-width:900px){.split{grid-template-columns:1fr}}
/* MER hero */
.mer{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:var(--gap)}
@media(max-width:700px){.mer{grid-template-columns:1fr 1fr}}
.mer .m{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 15px}
.mer .m.hero{background:linear-gradient(135deg,#1c2432,#161a21);border-color:#2b3648}
.mer .lbl{color:var(--ink3);font-size:11px;text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.mer .big{font-size:30px;font-weight:750;letter-spacing:-.5px;margin-top:4px;line-height:1}
.mer .m.hero .big{font-size:40px;color:var(--brand)}
.mer .note{font-size:11px;color:var(--ink2);margin-top:6px}
.mer .bkbar{height:5px;border-radius:3px;background:var(--elev);margin-top:9px;overflow:hidden}
.mer .bkfill{height:100%;border-radius:3px}
.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl th{color:var(--ink3);font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;text-align:right;padding:6px 7px;font-weight:600}
.tbl th:first-child{text-align:left}
.tbl td{padding:9px 7px;text-align:right;border-top:1px solid var(--line);color:var(--ink2)}
.tbl td:first-child{text-align:left;color:var(--ink);max-width:210px}
.tbl .sharebar{height:3px;background:var(--spend);border-radius:2px;margin-top:5px;opacity:.8}
.comp{display:flex;align-items:center;gap:10px;margin:9px 0}
.comp .nm{width:150px;font-size:12px;color:var(--ink);flex:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.comp .track{flex:1;height:20px;background:var(--elev);border-radius:6px;overflow:hidden}
.comp .fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--conv),#0e9f6e)}
.comp .meta{width:132px;font-size:11px;color:var(--ink2);text-align:right;flex:none}
.plays{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap)}
@media(max-width:700px){.plays{grid-template-columns:1fr}}
.play{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.play .pt{font-weight:650;font-size:13px;color:#fff;margin-bottom:3px}
.play .pd{font-size:12px;color:var(--ink2);line-height:1.45}
.play .n{color:var(--brand);font-weight:700;margin-right:6px}
.bmrow{padding:10px 0;border-bottom:1px solid var(--line)}
.bmrow .top{display:flex;justify-content:space-between;font-size:13px;gap:10px}
.bmrow .nt{font-size:12px;color:var(--ink2);margin-top:4px;line-height:1.45}
</style>
</head>
<body>
<div id="gate">
  <div class="gatebox">
    <div class="star">✦</div>
    <h1>Jambala Ads</h1>
    <p>Enter passphrase to view the dashboard</p>
    <input id="pw" type="password" autocomplete="off" placeholder="passphrase" autofocus>
    <button id="go">Unlock</button>
    <div class="gateerr" id="err"></div>
  </div>
</div>

<div class="wrap" id="app" style="display:none"></div>
<div class="tip" id="tip"></div>

const $=(s,r=document)=>r.querySelector(s);
const b64d=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));

async function deriveKey(pw,salt){
  const base=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:150000,hash:"SHA-256"},base,{name:"AES-GCM",length:256},false,["decrypt"]);
}
async function decrypt(pw){
  const [s,i,c]=ENC.split(".");
  const key=await deriveKey(pw,b64d(s));
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(i)},key,b64d(c));
  return JSON.parse(new TextDecoder().decode(pt));
}
async function unlock(){
  const pw=$("#pw").value.trim(); if(!pw)return;
  $("#err").textContent="";
  try{ const data=await decrypt(pw); sessionStorage.setItem("jpw",pw); $("#gate").style.display="none"; $("#app").style.display="block"; render(data); }
  catch(e){ $("#err").textContent="Wrong passphrase."; }
}
$("#go").onclick=unlock; $("#pw").addEventListener("keydown",e=>{if(e.key==="Enter")unlock()});
// auto-unlock within a session
(async()=>{const saved=sessionStorage.getItem("jpw"); if(saved){try{const d=await decrypt(saved);$("#gate").style.display="none";$("#app").style.display="block";render(d);}catch(e){}}})();

const money=(n,d=2)=>"£"+(n==null?"—":Number(n).toLocaleString("en-GB",{minimumFractionDigits:d,maximumFractionDigits:d}));
const num=n=>n==null?"—":Number(n).toLocaleString("en-GB");
let DATA, WIN="last_7d";

function tone(metric,v){ // returns g/a/r
  const t=DATA.thresholds||{};
  if(v==null)return "";
  if(metric==="roas"){return v>=1?"g":v>=0.5?"a":"r";}
  if(metric==="cpa"){return v<=10?"g":v<=20?"a":"r";}
  if(metric==="ctr"){return v>=2?"g":v>=1.2?"a":"r";}
  return "";
}

/* ---- SVG line chart with hover ---- */
function lineChart(el,pts,color,fmt){
  const W=340,H=120,pad={l:8,r:8,t:14,b:18};
  const xs=pts.map((_,i)=>i), ys=pts.map(p=>p.v==null?0:p.v);
  const maxY=Math.max(...ys,0.0001), minY=Math.min(...ys,0);
  const X=i=>pad.l+(i/(pts.length-1||1))*(W-pad.l-pad.r);
  const Y=v=>pad.t+(1-((v-minY)/((maxY-minY)||1)))*(H-pad.t-pad.b);
  const dPath=pts.map((p,i)=>(i?"L":"M")+X(i).toFixed(1)+" "+Y(p.v||0).toFixed(1)).join(" ");
  const area=dPath+" L"+X(pts.length-1)+" "+(H-pad.b)+" L"+X(0)+" "+(H-pad.b)+" Z";
  const gid="g"+Math.random().toString(36).slice(2,7);
  let svg=`<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="${gid}" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity=".28"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <line class="grid" x1="${pad.l}" y1="${H-pad.b}" x2="${W-pad.r}" y2="${H-pad.b}"/>
    <path d="${area}" fill="url(#${gid})"/>
    <path d="${dPath}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <text class="axis" x="${pad.l}" y="${H-5}">${pts[0].t}</text>
    <text class="axis" x="${W-pad.r}" y="${H-5}" text-anchor="end">${pts[pts.length-1].t}</text>
    <circle class="dot" r="0" id="${gid}c" stroke="${color}" stroke-width="2"/>
    <rect x="0" y="0" width="${W}" height="${H}" fill="transparent" id="${gid}h"/>
  </svg>`;
  el.insertAdjacentHTML("beforeend",svg);
  const root=el.lastElementChild, hit=root.querySelector("#"+gid+"h"), dot=root.querySelector("#"+gid+"c"), tip=$("#tip");
  hit.addEventListener("mousemove",ev=>{
    const r=root.getBoundingClientRect(), rx=(ev.clientX-r.left)/r.width*W;
    let i=Math.round((rx-pad.l)/((W-pad.l-pad.r)/(pts.length-1||1))); i=Math.max(0,Math.min(pts.length-1,i));
    dot.setAttribute("cx",X(i));dot.setAttribute("cy",Y(pts[i].v||0));dot.setAttribute("r",4);
    tip.style.opacity=1;tip.style.left=(ev.clientX+12)+"px";tip.style.top=(ev.clientY-10)+"px";
    tip.innerHTML=`<b>${pts[i].t}</b> · ${fmt(pts[i].v)}`;
  });
  hit.addEventListener("mouseleave",()=>{dot.setAttribute("r",0);tip.style.opacity=0;});
}
function buildCharts(){
  const h=DATA.history||[]; const c=$("#charts"); c.innerHTML="";
  const mk=(title,val,key,color,fmt)=>{
    const pts=h.map(p=>({t:p.t,v:p[key]}));
    const div=document.createElement("div");div.className="card";
    div.innerHTML=`<div class="ct"><span>${title}</span><span class="cv">${val}</span></div>`;
    c.appendChild(div); lineChart(div,pts,color,fmt);
  };
  const last=h[h.length-1]||{};
  mk("Daily spend", money(last.spend), "spend", "var(--spend)", v=>money(v));
  mk("Daily purchases", num(last.purchases), "purchases", "var(--conv)", v=>num(v)+" sales");
  mk("Purchases · 7-day rolling", num(last.purch7), "purch7", "var(--roas)", v=>num(v)+" in 7d");
}
function buildFunnel(){
  const f=DATA.funnel||[]; const max=Math.max(...f.map(x=>x.count),1);
  $("#funnel").innerHTML=f.map((x,i)=>`<div class="row"><div class="lbl">${x.stage}</div>
    <div class="bar" style="width:${Math.max(2,x.count/max*100)}%;opacity:${1-i*0.11}"></div>
    <div class="num">${num(x.count)}</div><div class="pct">${i?Math.round(x.count/f[0].count*100)+"%":""}</div></div>`).join("")
    + (DATA.funnel_flags||[]).map(fl=>`<div class="flag">⚠ ${fl}</div>`).join("");
}
function buildShopify(){
  const s=DATA.shopify||{}; const rows=[["today","Today"],["last_7d","7 days"],["last_30d","30 days"],["launch","Since launch"]];
  $("#shopify").innerHTML=`<table style="width:100%;border-collapse:collapse;font-size:13px">
    <tr style="color:var(--ink3);font-size:11px;text-transform:uppercase;letter-spacing:.5px"><td style="padding:4px 0">Window</td><td style="text-align:right">Orders</td><td style="text-align:right">Revenue</td><td style="text-align:right">AOV</td></tr>
    ${rows.map(([k,lbl])=>{const w=s[k]||{};return `<tr style="border-top:1px solid var(--line)"><td style="padding:8px 0;color:var(--ink2)">${lbl}</td><td style="text-align:right">${num(w.orders||0)}</td><td style="text-align:right;font-weight:600">${money(w.revenue||0)}</td><td style="text-align:right;color:var(--ink2)">${w.aov==null?"—":money(w.aov)}</td></tr>`}).join("")}
  </table>
  <div style="margin-top:11px;padding-top:11px;border-top:1px solid var(--line);font-size:12.5px;color:var(--ink2)">Repeat buyers: <b style="color:#fff">${DATA.repeatRate==null?"—":DATA.repeatRate+"%"}</b> of ${num(DATA.buyers)||"—"} — the LTV engine (judge paid on repeat, not first-order).</div>`;
}
function buildMer(){
  const m=DATA.mer||{};
  const bar=v=>v==null?"":`<div class="bkbar"><div class="bkfill" style="width:${Math.min(100,Math.max(2,(v||0)*100))}%;background:${v>=1?'var(--good)':v>=0.5?'var(--warn)':'var(--bad)'}"></div></div>`;
  const box=(lbl,v,note,hero)=>`<div class="m ${hero?'hero':''}"><div class="lbl">${lbl}</div><div class="big">${v==null?'—':v.toFixed(2)+'×'}</div><div class="note">${note}</div>${bar(v)}</div>`;
  $("#mer").innerHTML=
    box("Since launch",m.launch,m.launchRev!=null?`£${num(m.launchRev)} rev ÷ £${num(m.launchSpend)} spend · all channels`:"all channels",true)+
    box("Today",m.today,"store rev ÷ spend")+
    box("7 days",m.last_7d,"store rev ÷ spend")+
    box("30 days",m.last_30d,"store rev ÷ spend");
}
function buildCampaigns(){
  const cs=DATA.campaigns||[]; if(!cs.length){$("#campaigns").innerHTML='<div class="cv">No campaign spend yet.</div>';return;}
  const tot=cs.reduce((s,c)=>s+(c.spend||0),0)||1;
  $("#campaigns").innerHTML=`<table class="tbl">
    <tr><th>Campaign</th><th>Spend</th><th>%</th><th>Purch</th><th>CPA</th><th>CTR</th><th>ROAS</th></tr>
    ${cs.map(c=>`<tr><td>${c.name}<div class="sharebar" style="width:${Math.round(c.spend/tot*100)}%"></div></td>
      <td>${money(c.spend)}</td><td>${Math.round(c.spend/tot*100)}%</td><td>${num(c.purchases)}</td>
      <td>${c.cpa==null?'—':money(c.cpa)}</td><td>${c.ctr==null?'—':c.ctr.toFixed(2)+'%'}</td>
      <td>${c.roas==null?'—':c.roas.toFixed(2)+'×'}</td></tr>`).join("")}
  </table><div class="cv" style="margin-top:9px">Spend + Meta-attributed efficiency per campaign (since launch). MER stays blended/account-wide — attribution under-reports (no CAPI).</div>`;
}
function buildComps(){
  const cs=DATA.comps||[]; if(!cs.length){$("#comps").innerHTML='<div class="cv">No live competitions.</div>';return;}
  $("#comps").innerHTML=cs.map(c=>`<div class="comp"><div class="nm" title="${c.title}">${c.title}</div>
    <div class="track"><div class="fill" style="width:${Math.max(1.5,c.pct)}%"></div></div>
    <div class="meta">${num(c.sold)}/${num(c.max)} · ${c.pct}%${c.end?' · '+c.end.slice(5):''}</div></div>`).join("")
    +`<div class="cv" style="margin-top:9px">Tickets sold vs cap. Watch velocity against the draw date — a dated draw not filling is a loss-leader.</div>`;
}
function buildBenchmarks(){
  const b=(DATA.intel||{}).benchmarks; if(!b||!b.metrics){$("#benchmarks").innerHTML='<div class="cv">Benchmark intel pending next build.</div>';return;}
  $("#benchmarks").innerHTML=b.metrics.map(m=>`<div class="bmrow"><div class="top"><b style="color:#fff">${m.metric}</b><span style="color:var(--ink2);flex:none">avg ${m.industry_avg} · ${m.industry_range}</span></div><div class="nt">${m.note||''}</div></div>`).join("")
    +`<div class="cv" style="margin-top:10px">${b.source||''}</div>`;
}
function buildCompetitors(){
  const c=(DATA.intel||{}).competitors; if(!c||!c.patterns){$("#competitors").innerHTML='<div class="cv" style="grid-column:1/-1">Competitor intel pending next build.</div>';return;}
  $("#competitors").innerHTML=c.patterns.map((p,i)=>`<div class="play"><div class="pt"><span class="n">${i+1}</span>${p.pattern}</div><div class="pd">${p.detail}</div></div>`).join("");
}
function buildAlerts(){
  $("#alerts").innerHTML=(DATA.alerts||[]).map(a=>{
    const ico={good:"✅",warning:"⚠️",serious:"⛔",info:"ℹ️"}[a.level]||"•";
    return `<div class="alert ${a.level}"><span class="ico">${ico}</span><span>${a.text}</span></div>`;
  }).join("");
}
function buildInsights(){ $("#insights").innerHTML=(DATA.insights||[]).map(t=>`<li>${t}</li>`).join(""); }
function buildFoot(){ $("#foot").innerHTML=`
  <div style="display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:10px">
    <img src="${S7LOGO}" alt="Sector7" style="height:26px;width:auto;opacity:.92">
    <span style="font-weight:600;color:var(--ink2)">Powered by <span style="color:var(--brand)">Sector7</span></span>
    <span style="color:var(--ink3)">· <a href="https://sector7hq.co" target="_blank" rel="noopener" style="color:var(--ink3);text-decoration:none">sector7hq.co</a></span>
  </div>
  Data: Meta Marketing API + Shopify + GA4 · encrypted at rest · private to Jambala.<br>Generated ${DATA.gen||""}.`; }
</script>
